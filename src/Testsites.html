<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestatie</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

      d  body {
            background: linear-gradient(135deg, #a8d86f 0%, #b8e07f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .container {
            background: linear-gradient(135deg, #a8d86f 0%, #b8e07f 100%);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .header {
            background-color: #8fc74f;
            padding: 15px 60px;
            margin-bottom: 40px;
            border-radius: 5px;
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }

        .score {
            font-size: 28px;
            margin: 40px 0;
            color: #333;
            font-weight: bold;
        }

        .buttons-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        .btn {
            background-color: #8fc74f;
            color: #333;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            flex: 1;
            min-width: 120px;
        }

        .btn:hover {
            background-color: #7ab43a;
        }

        .btn:active {
            background-color: #6ba02f;
        }

        .btn-row {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn-row:first-child {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">Prestatie</div>

        <div class="score">Score: 230</div>

        <div class="buttons-container">
            <div class="btn-row">
                <button class="btn">Opnieuw</button>
                <button class="btn" onclick="window.location.href='test2.html'">Menu</button>
            </div>
        </div>
    </div>
</body>
</html>
