<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vraag</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #a8d86f 0%, #b8e07f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .container {
            background: linear-gradient(135deg, #a8d86f 0%, #b8e07f 100%);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            max-width: 700px;
            width: 100%;
        }

        .header {
            background-color: #8fc74f;
            padding: 20px 60px;
            margin-bottom: 40px;
            border-radius: 5px;
            font-size: 36px;
            font-weight: bold;
            color: #333;
        }

        .input-box {
            background-color: #ffffff;
            border: 2px solid #8fc74f;
            border-radius: 10px;
            padding: 20px;
            margin: 30px 0;
            font-size: 16px;
            min-height: 150px;
            resize: vertical;
        }

        .input-box::placeholder {
            color: #bbb;
        }

        .submit-btn {
            background-color: #7ab43a;
            color: #ffffff;
            border: none;
            padding: 20px 60px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 20px;
            width: 100%;
        }

        .submit-btn:hover {
            background-color: #6ba02f;
        }

        .submit-btn:active {
            background-color: #5a8f26;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">Vraag</div>

        <textarea class="input-box" placeholder="Typ hier je antwoord..."></textarea>

        <button class="submit-btn">Submit</button>
    </div>
</body>
</html>
