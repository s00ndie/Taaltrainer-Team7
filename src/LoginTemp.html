<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Template</title>
    <style>
        :root {
            --bg-color: #eef7ff;
            --card-bg: #fafdff;
            --text-color: #2f4860;
            --muted-text: #6f879d;
            --border-color: #cfe2f5;
            --button-bg: #9cc9f2;
            --button-hover: #88bce9;
            --button-text: #ffffff;
            --radius: 12px;
            --spacing: 16px;
            --card-width: 360px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: Arial, Helvetica, sans-serif;
            padding: 24px;
        }

        .login-kaart {
            width: 100%;
            max-width: var(--card-width);
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: calc(var(--spacing) * 1.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .login-title {
            margin: 0 0 8px;
            font-size: 1.5rem;
        }

        .login-subtitle {
            margin: 0 0 20px;
            color: var(--muted-text);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: var(--spacing);
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
        }

        input:focus {
            outline: 2px solid rgba(156, 201, 242, 0.4);
            border-color: var(--button-bg);
        }

        .login-knop {
            width: 100%;
            border: none;
            border-radius: 8px;
            background: var(--button-bg);
            color: var(--button-text);
            font-size: 1rem;
            font-weight: 600;
            padding: 11px 14px;
            cursor: pointer;
        }

        .login-knop:hover {
            background: var(--button-hover);
        }

        .extra-link {
            margin-top: 14px;
            font-size: 0.9rem;
            text-align: center;
            color: var(--muted-text);
        }

        .extra-link a {
            color: var(--button-bg);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main class="login-kaart">
        <h1 class="login-title">Welkom</h1>
        <p class="login-subtitle">Log in met je accountgegevens</p>

        <form action="#" method="post">
            <div class="form-group">
                <label for="email">E-mail/Gebruikersnaam</label>
                <input id="email" name="email" type="email" placeholder="jij@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Wachtwoord</label>
                <input id="password" name="password" type="password" placeholder="••••••••" required>
            </div>

            <button class="login-knop" type="submit">Inloggen</button>
        </form>
        </p>
    </main>
</body>
</html>
